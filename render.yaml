services:
  # ── Backend Service ──────────────────────────────────────────────
  - type: web
    name: ars-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 5050
    rootDir: ars-backend
    envVars:
      - key: XAI_API_KEY
        sync: false # User must set this in Render UI
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: 5050

  # ── Agents Service ───────────────────────────────────────────────
  - type: web
    name: ars-agents
    env: python
    buildCommand: pip install -r app/requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    rootDir: ars-agents
    envVars:
      - key: XAI_API_KEY
        sync: false # User must set this in Render UI
      - key: BACKEND_URL
        fromService:
          name: ars-backend
          type: web
          property: host
      - key: PORT
        value: 8000

  # ── Frontend Service ─────────────────────────────────────────────
  - type: static
    name: ars-frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    rootDir: ars-frontend
    envVars:
      - key: VITE_BACKEND_API_URL
        sync: false # User will set these in Render UI
      - key: VITE_AGENTS_API_URL
        sync: false

