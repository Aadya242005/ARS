name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend Lint & Build ─────────────────────────────────────────
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ars-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ars-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  # ── Backend Syntax Check ──────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ars-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile main.py

  # ── Agents Syntax Check ──────────────────────────────────────────
  agents:
    name: Agents CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ars-agents

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app/main.py

  # ── Security: Secret Scan ─────────────────────────────────────────
  security:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets
        run: |
          echo "Scanning for potential secret leaks..."
          if grep -rn "sk-[a-zA-Z0-9]" --include="*.py" --include="*.js" --include="*.jsx" --include="*.ts" . ; then
            echo "::error::Potential API key found in source code!"
            exit 1
          fi
          echo "✅ No secrets detected in source code."
